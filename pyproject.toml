[tool.pytest.ini_options]
# Use importlib mode so vol3's per-chapter test_template.py modules don't
# collide on basename (pytest's default "prepend" mode requires unique
# test-module names across the whole project).
addopts = "--import-mode=importlib"

[tool.mypy]
python_version = "3.14"
warn_unused_configs = true
# NumPy/Matplotlib-heavy learning material ("Deep Learning from Scratch"
# series). Type-checking is kept lenient: mypy runs and must pass, but
# per-function annotations are not enforced and missing third-party stubs
# are ignored. Each volume is checked independently in CI to avoid
# cross-volume duplicate-module collisions in this flat-layout codebase.
ignore_missing_imports = true
namespace_packages = true
explicit_package_bases = true
# `vol2/dataset/` is vendored dataset code, excluded from type-checking.
exclude = [
    "vol2/dataset/",
]
